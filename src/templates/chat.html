<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustChat Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --sidebar-width: 280px;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- ÉCRAN DE LOGIN --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* --- DASHBOARD LAYOUT --- */
        #app-container {
            display: none; /* Caché avant login */
            width: 100%;
            height: 100%;
            flex-direction: row;
        }

        /* Sidebar (Rooms) */
        .sidebar {
            width: var(--sidebar-width);
            background: #1e293b;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        .sidebar h2 { font-size: 1.2rem; margin-bottom: 1.5rem; padding-left: 0.5rem; }

        #room-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .room-btn {
            background: transparent;
            color: #94a3b8;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .room-btn:hover { background: #334155; color: white; }
        .room-btn.active { background: var(--primary); color: white; }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            height: 64px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
        }

        /* Chat Area */
        #chat-window {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            gap: 1rem;
            overflow: hidden;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            background: white;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* UI Elements */
        .input-group { display: flex; gap: 0.5rem; }
        input {
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: var(--primary); }
        
        button {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { background: var(--primary-hover); }

        .message-item {
            padding: 0.5rem 1rem;
            background: #f1f5f9;
            border-radius: 0.5rem;
            width: fit-content;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1 style="margin-top:0">Bienvenue</h1>
            <p style="color: var(--text-muted)">Entrez votre pseudo pour commencer</p>
            <div class="input-group" style="flex-direction: column; gap: 1rem;">
                <input type="text" id="username" placeholder="Pseudo (ex: Alice)">
                <button onclick="connect()">Se connecter</button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <div class="sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 style="margin: 0;">Salons</h2>
                <button onclick="fetchRooms()" style="padding: 5px 10px; background: #475569; font-size: 0.8rem;" title="Rafraîchir la liste">
                    🔄
                </button>
            </div>
            <div id="room-list"></div>
            <div class="input-group" style="margin-top: 1rem; flex-direction: column;">
                <input type="text" id="new-room-name" placeholder="Nouveau salon..." style="background: #334155; border: none; color: white;">
                <button onclick="createRoom()" style="background: #475569;">+ Créer</button>
            </div>
        </div>

        <div class="main-content">
            <header>
                <h3 id="current-room-name" style="margin:0">Sélectionnez un salon</h3>
                <div class="user-profile">
                    <span id="display-username">Pseudo</span>
                    <div class="user-avatar" id="user-initials">?</div>
                </div>
            </header>

            <div id="chat-window">
                <div id="messages">
                    <p style="text-align: center; color: var(--text-muted)">Bienvenue dans RustChat ! Choisissez un salon à gauche pour discuter.</p>
                </div>
                <div class="input-group">
                    <input type="text" id="message-input" placeholder="Écrire un message..." style="flex-grow: 1;">
                    <button onclick="sendMessage()">Envoyer</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myToken = "";
        let myLogin = "";
        let currentSocket = null;
        let activeRoomId = null;
        const API_URL = "http://127.0.0.1:3000";

        async function connect() {
            const input = document.getElementById('username');
            myLogin = input.value.trim();
            if (!myLogin) return;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pseudo: myLogin })
                });
                const data = await res.json();
                myToken = data.token;

                // UI Update
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                document.getElementById('display-username').innerText = myLogin;
                document.getElementById('user-initials').innerText = myLogin.charAt(0).toUpperCase();

                fetchRooms();
            } catch (e) { alert("Erreur de connexion au serveur."); }
        }

        async function fetchRooms() {
            const listDiv = document.getElementById('room-list');
            
            // Optionnel : Feedback visuel pendant le chargement
            const refreshBtn = document.querySelector('button[onclick="fetchRooms()"]');
            if (refreshBtn) refreshBtn.style.opacity = "0.5";

            try {
                const res = await fetch(`${API_URL}/rooms`);
                const rooms = await res.json();
                
                listDiv.innerHTML = "";

                rooms.forEach(room => {
                    const btn = document.createElement('button');
                    // On vérifie si c'est la room active pour garder le focus visuel
                    btn.className = `room-btn ${activeRoomId === room.id ? 'active' : ''}`;
                    btn.innerText = `# ${room.name}`;
                    btn.onclick = () => joinRoom(room.id, room.name);
                    listDiv.appendChild(btn);
                });
            } catch (e) {
                console.error("Erreur lors de la récupération des salons", e);
            } finally {
                if (refreshBtn) refreshBtn.style.opacity = "1";
            }
        }

        async function createRoom() {
            const input = document.getElementById('new-room-name');
            const name = input.value.trim();
            if (!name) return;
            await fetch(`${API_URL}/rooms`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            input.value = "";
            fetchRooms();
        }

        async function joinRoom(roomId, roomName) {
            if (activeRoomId === roomId) return;
            activeRoomId = roomId;

            // 1. Mise à jour de l'UI immédiate
            document.getElementById('current-room-name').innerText = `# ${roomName}`;
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = "<p style='text-align:center; color:gray;'>Chargement de l'historique...</p>";
            fetchRooms(); // Pour rafraîchir l'état "active" des boutons

            // 2. Charger l'historique depuis l'API Rust
            try {
                const historyRes = await fetch(`${API_URL}/chat/${roomId}/history`);
                if (historyRes.ok) {
                    const history = await historyRes.json();
                    messagesDiv.innerHTML = ""; // On vide le message de chargement
                    
                    if (history.length === 0) {
                        messagesDiv.innerHTML = "<p style='text-align:center; color:var(--text-muted)'>Aucun message ancien. Soyez le premier à parler !</p>";
                    } else {
                        history.forEach(msg => addMessageToUI(msg));
                    }
                }
            } catch (e) {
                console.error("Impossible de charger l'historique", e);
                messagesDiv.innerHTML = "<p style='text-align:center; color:red;'>Erreur lors du chargement de l'historique.</p>";
            }

            // 3. Connexion WebSocket pour le temps réel
            if (currentSocket) currentSocket.close();
            
            const wsUrl = `ws://127.0.0.1:3000/chat/${roomId}?token=${myToken}`;
            currentSocket = new WebSocket(wsUrl);

            currentSocket.onmessage = (event) => {
                // Si on reçoit un message du salon alors qu'on a déjà l'historique
                // On vérifie qu'on n'a pas de message de "vide" affiché
                if (messagesDiv.querySelector('p')) {
                    messagesDiv.innerHTML = "";
                }
                const data = JSON.parse(event.data);
                addMessageToUI(data);
            };
        }

        function addMessageToUI(data) {
            const dateObj = new Date(data.datetime);
            const formattedTime = dateObj.toLocaleString('fr-FR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            const messagesDiv = document.getElementById('messages');
            const msgElement = document.createElement('div');
            msgElement.className = 'message-item';
            msgElement.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: baseline; gap: 10px;">
                    <span style="font-size: 0.75rem; font-weight: bold; color: ${data.user_color}">${data.user_login}</span>
                    <span style="font-size: 0.65rem; color: #888;">${formattedTime}</span>
                </div>
                <div style="margin-top: 2px;">${data.message}</div>
            `;
            messagesDiv.appendChild(msgElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text && currentSocket && currentSocket.readyState === WebSocket.OPEN) {
                currentSocket.send(text);
                input.value = '';
                input.focus();
            }
        }

        // Touche Entrée
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const aid = document.activeElement.id;
                if (aid === 'username') connect();
                if (aid === 'new-room-name') createRoom();
                if (aid === 'message-input') sendMessage();
            }
        });
    </script>
</body>
</html>
